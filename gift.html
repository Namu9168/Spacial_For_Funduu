<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Borahae 3D Surprise 💜</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap');

:root {
    --purple-primary: #7b2cbf;
    --purple-light: #9d4edd;
    --purple-dark: #3c096c;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #240046, #10002b);
    cursor: pointer;
    touch-action: manipulation;
}

/* ✨ FLOATING GALAXY PARTICLES */
.magic {
    position: fixed; 
    pointer-events: none;
    color: #e0aaff; 
    z-index: 1;
    filter: drop-shadow(0 0 5px #c77dff);
}

/* 📦 3D BOX SETUP - RESPONSIVE SIZING */
.stage {
    --box-size: clamp(140px, 45vw, 200px);
    width: var(--box-size); 
    height: var(--box-size);
    perspective: 1200px;
    position: fixed; 
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

.box-3d {
    width: 100%; 
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: rotateBox 10s linear infinite;
    transition: all 0.8s ease;
}

@keyframes rotateBox {
    from { transform: rotateX(-20deg) rotateY(0deg); }
    to { transform: rotateX(-20deg) rotateY(360deg); }
}

.face {
    position: absolute; 
    width: 100%; 
    height: 100%;
    background: var(--purple-primary);
    border: 2px solid var(--purple-light);
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-size: clamp(18px, 5vw, 28px); 
    font-weight: bold;
    color: white; 
    box-shadow: inset 0 0 40px rgba(0,0,0,0.4);
    backface-visibility: visible;
    font-family: 'Dancing Script', cursive;
}

/* Z-translation based on half of the box size */
.front  { transform: translateZ(calc(var(--box-size) / 2)); }
.back   { transform: rotateY(180deg) translateZ(calc(var(--box-size) / 2)); }
.left   { transform: rotateY(-90deg) translateZ(calc(var(--box-size) / 2)); }
.right  { transform: rotateY(90deg) translateZ(calc(var(--box-size) / 2)); }
.bottom { transform: rotateX(-90deg) translateZ(calc(var(--box-size) / 2)); background: var(--purple-dark); }

.lid {
    position: absolute; 
    width: calc(100% + 10px); 
    height: calc(100% + 10px);
    top: -5px; 
    left: -5px;
    transform-style: preserve-3d;
    transform: rotateX(90deg) translateZ(calc(var(--box-size) / 2 + 5px));
    transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.lid-face {
    position: absolute; 
    width: 100%; 
    height: 100%;
    background: var(--purple-light);
    border: 3px solid white;
    display: flex; 
    align-items: center; 
    justify-content: center;
    box-shadow: 0 0 30px rgba(157, 78, 221, 0.6);
}

/* 💥 OPEN STATE */
.stage.open .box-3d { animation: none; transform: scale(0); opacity: 0; }

/* 🔐 PASSWORD SCREEN */
#password-screen {
    position: fixed; 
    inset: 0; 
    display: none;
    justify-content: center; 
    align-items: center;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    background: rgba(16, 0, 43, 0.7);
    z-index: 1000;
}

.pass-box {
    background: rgba(255, 255, 255, 0.1);
    padding: clamp(20px, 8vw, 40px); 
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px var(--purple-light);
    text-align: center; 
    color: white;
    width: 90%; 
    max-width: 400px;
}

.pass-box h2 { font-size: 1.8rem; margin-bottom: 10px; color: #e0aaff; }
.hint { font-size: 0.9rem; margin-bottom: 25px; opacity: 0.8; }

#status-msg {
    height: 20px; 
    font-size: 0.85rem; 
    margin-bottom: 15px;
    color: #ff4d6d; 
    font-weight: 600;
}

input {
    width: 100%; 
    padding: 16px; 
    border-radius: 20px; 
    border: none;
    background: rgba(255, 255, 255, 0.9);
    margin-bottom: 20px; 
    text-align: center; 
    font-size: 18px;
    color: var(--purple-dark); 
    outline: none; 
    font-weight: 600;
}

button {
    width: 100%; 
    padding: 16px; 
    border-radius: 20px; 
    border: none;
    background: linear-gradient(45deg, #7b2cbf, #ff007f);
    color: white; 
    font-weight: 700; 
    cursor: pointer;
    text-transform: uppercase; 
    letter-spacing: 1px;
    transition: 0.3s;
}

.shake { animation: shake 0.5s; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}
</style>
</head>
<body onclick="startMusic()">

<div class="stage" id="mainStage" onclick="openBox()">
    <div class="box-3d" id="boxContainer">
        <div class="face front">SURPRISE</div>
        <div class="face back">ARMY 💜</div>
        <div class="face left">FOR</div>
        <div class="face right">YOU 🎁</div>
        <div class="face bottom"></div>
        <div class="lid">
            <div class="lid-face"><span style="color:white; font-size:40px;">💜</span></div>
        </div>
    </div>
</div>

<div id="password-screen">
    <div class="pass-box" id="passBox">
        <h2>Unwrap The Magic</h2>
        <p class="hint">Hint: It's Your Favorite One!</p>
        <div id="status-msg"></div>
        <input type="password" id="pass" placeholder="Enter Access Code" inputmode="numeric">
        <button onclick="checkPass()">Unlock Surprise</button>
    </div>
</div>

<audio id="bgm" loop><source src="music1.mp3"></audio>

<script>
let musicStarted = false;
const bgm = document.getElementById("bgm");

function startMusic() {
    if (!musicStarted) {
        bgm.play().catch(() => {});
        musicStarted = true;
    }
}

// ✨ Floating Particles
setInterval(() => {
    const m = document.createElement("div");
    m.className = "magic";
    m.innerText = ['💜', '✨', '⭐', '☁️'][Math.floor(Math.random()*4)];
    m.style.left = Math.random() * 100 + "vw";
    m.style.fontSize = Math.random() * 20 + 10 + "px";
    m.style.bottom = "-50px";
    document.body.appendChild(m);

    m.animate([
        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
        { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
    ], { duration: 5000 + Math.random() * 3000 }).onfinish = () => m.remove();
}, 450);

function openBox() {
    const stage = document.getElementById("mainStage");
    if (stage.classList.contains('open')) return;
    
    stage.classList.add("open");

    for(let i=0; i<80; i++) {
        setTimeout(createConfetti, i * 12);
    }

    setTimeout(() => {
        document.getElementById("password-screen").style.display = "flex";
    }, 1000);
}

function createConfetti() {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = "50vw"; c.style.top = "50vh";
    c.innerText = ['💜', '✨', '🌸'][Math.floor(Math.random()*3)];
    c.style.fontSize = Math.random() * 25 + 15 + "px";
    c.style.pointerEvents = "none";
    c.style.zIndex = "1100";
    document.body.appendChild(c);

    const x = (Math.random() - 0.5) * window.innerWidth * 1.5;
    const y = (Math.random() - 0.5) * window.innerHeight * 1.5;

    c.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${x}px, ${y}px) scale(0) rotate(720deg)`, opacity: 0 }
    ], { duration: 2500, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => c.remove();
}

const playfulMessages = [
    "Nice try! But that's not it 😜",
    "Wrong code, try harder Army! 💜",
    "Incorrect! Hint: Think of BTS! ✨",
    "Nope! Try 1234 maybe? 😉"
];

function checkPass() {
    const val = document.getElementById("pass").value;
    const box = document.getElementById("passBox");
    const msg = document.getElementById("status-msg");

    if(val === "1234") {
        msg.style.color = "#00ff88";
        msg.innerText = "SUCCESS! Preparing your surprise...";
        for(let i=0; i<100; i++) setTimeout(createConfetti, i * 5);
        
        setTimeout(() => { 
            window.location.href = "final.html"; 
        }, 1500);
    } else {
        box.classList.add("shake");
        msg.innerText = playfulMessages[Math.floor(Math.random() * playfulMessages.length)];
        setTimeout(() => box.classList.remove("shake"), 500);
        document.getElementById("pass").value = "";
    }
}
</script>

</body>
</html>
