<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁 Here is Somthing For You 🎁</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle,#ff8fd6,#5a1f47);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    color:white;
    text-align:center;
}

/* Gift Cinematic */
#gift{
    font-size:140px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:float 2.2s infinite ease-in-out, glow 2.8s infinite alternate;
    cursor:pointer;
}

@keyframes float{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-26px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}

@keyframes glow{
    0%{filter:drop-shadow(0 0 15px #ff9ae8);}
    100%{filter:drop-shadow(0 0 35px #ffd2f8);}
}

/* Open animation */
.open{
    animation:openGift 1s forwards ease-out;
}
@keyframes openGift{
    from{transform:translate(-50%,-50%) scale(1);}
    to{transform:translate(-50%,-50%) scale(2.5); opacity:0;}
}

/* Password Screen */
#password-screen{
    position:fixed;
    width:100%;
    height:100%;
    backdrop-filter:blur(8px);
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
}

.pass-box{
    background:rgba(255,255,255,0.2);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px #ffaaf0;
    animation:popIn .7s ease-out;
}

@keyframes popIn{
    from{transform:scale(0.7); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    outline:none;
}

button{
    margin-top:12px;
    padding:10px 25px;
    background:#ff40c8;
    color:white;
    border:none;
    border-radius:25px;
    cursor:pointer;
    box-shadow:0 0 18px #ff8ade;
}

.shake{
    animation:shake .4s;
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-10px);}
    50%{transform:translateX(10px);}
    100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div id="gift">🎁</div>

<!-- Password Popup -->
<div id="password-screen">
    <div class="pass-box" id="passBox">
        <h2>Enter Password 🎁</h2>
        <input type="password" id="pass" placeholder="Enter password"><br>
        <button onclick="checkPass()">Unlock</button>
    </div>
</div>

<script>
let gift = document.getElementById("gift");
let pScreen = document.getElementById("password-screen");

gift.onclick = () => {
    gift.classList.add("open");
    setTimeout(()=> pScreen.style.display="flex", 900);
};

function checkPass(){
    let p = document.getElementById("pass").value;
    let box = document.getElementById("passBox");

    if(p === "1234"){
        window.location.href = "final.html";
    } else {
        box.classList.add("shake");
        setTimeout(()=> box.classList.remove("shake"), 400);
    }
}
</script>

</body>
</html>
