<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise Box 🎁</title>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent;
}

body{
    margin:0;
    overflow:hidden;
    height:100vh;
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at center,#ff9de6,#6a2b58,#2a0f23);
}

/* ✨ SPARKLES */
.sparkle{
    position:fixed;
    width:6px;height:6px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px pink;
    animation:floatUp 5s linear forwards;
}
@keyframes floatUp{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh); opacity:0;}
}

/* 🎁 GIFT */
#gift{
    font-size:clamp(90px,22vw,150px);
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    animation:float 2.2s infinite ease-in-out, glow 2.8s infinite alternate;
    cursor:pointer;
    z-index:10;
    user-select:none;
}

@keyframes float{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-22px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}

@keyframes glow{
    from{filter:drop-shadow(0 0 15px #ff9ae8);}
    to{filter:drop-shadow(0 0 40px #ffd2f8);}
}

/* 💥 OPEN */
.open{
    animation:openGift 0.9s forwards ease-out;
}
@keyframes openGift{
    to{
        transform:translate(-50%,-50%) scale(2.5);
        opacity:0;
    }
}

/* 💥 BURST */
.burst{
    position:fixed;
    width:12px;height:12px;
    background:white;
    border-radius:50%;
    animation:burst 1s forwards;
}
@keyframes burst{
    to{
        transform:translate(var(--x),var(--y)) scale(0.4);
        opacity:0;
    }
}

/* 🔐 PASSWORD SCREEN */
#password-screen{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.7);
    padding:20px;
    z-index:1000;
}

/* 💎 BOX */
.pass-box{
    background:rgba(255,255,255,0.12);
    padding:25px;
    border-radius:18px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 40px rgba(255,150,230,0.5);
    text-align:center;
    color:white;
    width:100%;
    max-width:320px;
    animation:popIn .6s ease-out;
}

@keyframes popIn{
    from{transform:scale(0.7); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:12px;
    outline:none;
    font-size:16px;
}

/* BUTTON */
button{
    width:100%;
    margin-top:14px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff4dc4,#ff85e4);
    color:white;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 0 20px #ff7ad9;
}

/* ❌ WRONG */
.shake{
    animation:shake .4s;
}
@keyframes shake{
    25%{transform:translateX(-6px);}
    50%{transform:translateX(6px);}
}

/* ✅ SUCCESS */
.success{
    animation:success .5s;
}
@keyframes success{
    from{transform:scale(0.9);}
    to{transform:scale(1.05);}
}
</style>
</head>

<body>

<div id="gift">🎁</div>

<div id="password-screen">
    <div class="pass-box" id="passBox">
        <h2>Unlock Your Surprise <br> Hint:It's Your Favorite</h2>
        <input type="password" id="pass" placeholder="Enter password">
        <button onclick="checkPass()">Open Gift</button>
    </div>
</div>

<audio id="bgm" loop>
    <source src="music1.mp3">
</audio>

<script>

/* ✨ SPARKLES */
setInterval(()=>{
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),5000);
},250);

/* 🎁 CLICK */
let gift=document.getElementById("gift");
let pScreen=document.getElementById("password-screen");

function openGift(){

    gift.classList.add("open");

    /* 💥 burst effect */
    for(let i=0;i<25;i++){
        let b=document.createElement("div");
        b.className="burst";
        b.style.left="50vw";
        b.style.top="50vh";
        b.style.setProperty("--x",(Math.random()*300-150)+"px");
        b.style.setProperty("--y",(Math.random()*300-150)+"px");
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),1000);
    }

    /* 👉 HIDE GIFT AFTER OPEN */
    setTimeout(()=>{
        gift.style.display="none";   // 🔥 FIXED
        pScreen.style.display="flex";
        document.getElementById("bgm").play().catch(()=>{});
    },800);
}

gift.addEventListener("click",openGift);
gift.addEventListener("touchstart",openGift);

/* 🔐 PASSWORD */
function checkPass(){
    let val=document.getElementById("pass").value;
    let box=document.getElementById("passBox");

    if(val==="1234"){
        box.classList.add("success");
        setTimeout(()=>{
            window.location.href="final.html";
        },600);
    }else{
        box.classList.add("shake");
        setTimeout(()=>box.classList.remove("shake"),400);
    }
}
</script>

</body>
</html>
