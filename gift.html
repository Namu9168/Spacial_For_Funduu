<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Borahae Magic 💜</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap');

:root {
    --purple-primary: #7b2cbf;
    --purple-light: #9d4edd;
    --purple-dark: #3c096c;
    --neon-glow: 0 0 20px rgba(157, 78, 221, 0.8), 0 0 40px rgba(157, 78, 221, 0.4);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0; 
    overflow: hidden; 
    height: 100vh; 
    width: 100vw;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #240046, #0a001a);
    cursor: pointer;
    touch-action: manipulation;
}

/* ✨ FLOATING GALAXY PARTICLES */
.magic {
    position: fixed; 
    pointer-events: none;
    color: #e0aaff; 
    z-index: 1;
    filter: drop-shadow(0 0 5px #c77dff);
}

/* 🎁 NEW STUNNING GIFT CONTAINER */
.gift-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(250px, 60vw, 400px);
    height: clamp(250px, 60vw, 400px);
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.gift-image {
    width: 100%;
    height: auto;
    filter: drop-shadow(var(--neon-glow));
    animation: floatGift 3s ease-in-out infinite;
}

@keyframes floatGift {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
}

.tap-text {
    position: absolute;
    bottom: -40px;
    width: 100%;
    text-align: center;
    color: white;
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; text-shadow: 0 0 10px white; }
}

/* 💥 OPEN ANIMATION */
.gift-container.open {
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
}

/* 🔐 PASSWORD SCREEN (Glassmorphism) */
#password-screen {
    position: fixed; 
    inset: 0; 
    display: none;
    justify-content: center; 
    align-items: center;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    background: rgba(16, 0, 43, 0.6);
    z-index: 1000;
}

.pass-box {
    background: rgba(255, 255, 255, 0.05);
    padding: clamp(25px, 8vw, 40px); 
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
    text-align: center; 
    color: white;
    width: 85%; 
    max-width: 400px;
}

.pass-box h2 { font-size: 1.8rem; margin: 0 0 10px; color: #e0aaff; }

#status-msg {
    height: 25px; 
    font-size: 0.85rem; 
    margin-bottom: 10px;
    color: #ff4d6d; 
    font-weight: 600;
}

input {
    width: 100%; 
    padding: 18px; 
    border-radius: 25px; 
    border: none;
    background: rgba(255, 255, 255, 0.95);
    margin-bottom: 20px; 
    text-align: center; 
    font-size: 1.1rem;
    color: var(--purple-dark); 
    outline: none; 
    font-weight: 600;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button {
    width: 100%; 
    padding: 18px; 
    border-radius: 25px; 
    border: none;
    background: linear-gradient(45deg, #7b2cbf, #ff007f);
    color: white; 
    font-weight: 700; 
    cursor: pointer;
    text-transform: uppercase; 
    letter-spacing: 2px;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(255, 0, 127, 0.3);
}

button:active { transform: scale(0.95); }

.shake { animation: shake 0.5s; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}
</style>
</head>
<body onclick="startMusic()">

<div class="gift-container" id="giftBox" onclick="openBox()">
    <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExN212cXF3Z2k2MmlpdjZnMHFpbDV3N3BtbXV5cTU3Z3RuMnFjcXRqbCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/yU6XRWNNTJMeAh4vau/giphy.gif" alt="Surprise Gift" class="gift-image">
    <div class="tap-text">Tap to Open 💜</div>
</div>

<div id="password-screen">
    <div class="pass-box" id="passBox">
        <h2>Army Access Only</h2>
        <p style="opacity: 0.8; font-size: 0.9rem;">You Need Code for this(Hint - Your Most Fav!) 😉</p>
        <div id="status-msg"></div>
        <input type="password" id="pass" placeholder="Enter Magic Code" inputmode="numeric">
        <button onclick="checkPass()">Unlock Surprise</button>
    </div>
</div>

<audio id="bgm" loop><source src="music1.mp3"></audio>

<script>
let musicStarted = false;
const bgm = document.getElementById("bgm");

function startMusic() {
    if (!musicStarted) {
        bgm.play().catch(() => {});
        musicStarted = true;
    }
}

// ✨ Floating Particles (Improved Frequency)
setInterval(() => {
    const m = document.createElement("div");
    m.className = "magic";
    m.innerText = ['💜', '✨', '⭐', '☁️', '🌸'][Math.floor(Math.random()*5)];
    m.style.left = Math.random() * 100 + "vw";
    m.style.fontSize = Math.random() * 25 + 10 + "px";
    m.style.bottom = "-50px";
    document.body.appendChild(m);

    m.animate([
        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
        { transform: `translateY(-110vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
    ], { duration: 4000 + Math.random() * 3000 }).onfinish = () => m.remove();
}, 300);

function openBox() {
    const gift = document.getElementById("giftBox");
    if (gift.classList.contains('open')) return;
    
    gift.classList.add("open");

    // Explosion Effect
    for(let i=0; i<100; i++) {
        setTimeout(createConfetti, i * 10);
    }

    setTimeout(() => {
        const screen = document.getElementById("password-screen");
        screen.style.display = "flex";
        document.getElementById("pass").focus();
    }, 800);
}

function createConfetti() {
    const c = document.createElement("div");
    c.style.position = "fixed";
    c.style.left = "50vw"; c.style.top = "50vh";
    c.innerText = ['💜', '✨', '🌸', '🍭'][Math.floor(Math.random()*4)];
    c.style.fontSize = Math.random() * 30 + 15 + "px";
    c.style.pointerEvents = "none";
    c.style.zIndex = "1100";
    document.body.appendChild(c);

    const x = (Math.random() - 0.5) * window.innerWidth * 1.8;
    const y = (Math.random() - 0.5) * window.innerHeight * 1.8;

    c.animate([
        { transform: 'translate(0, 0) scale(1)', opacity: 1 },
        { transform: `translate(${x}px, ${y}px) scale(0) rotate(1080deg)`, opacity: 0 }
    ], { duration: 2000, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => c.remove();
}

function checkPass() {
    const val = document.getElementById("pass").value;
    const box = document.getElementById("passBox");
    const msg = document.getElementById("status-msg");

    if(val === "1") {
        msg.style.color = "#00ff88";
        msg.innerText = "SUCCESS! Borahae! 💜";
        for(let i=0; i<150; i++) setTimeout(createConfetti, i * 5);
        
        setTimeout(() => { 
            window.location.href = "final.html"; 
        }, 1500);
    } else {
        box.classList.add("shake");
        msg.innerText = "Incorrect! Hint: Think 😉";
        setTimeout(() => box.classList.remove("shake"), 500);
        document.getElementById("pass").value = "";
    }
}
</script>

</body>
</html>
