<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cinematic Birthday Surprise ✨</title>

<style>
/* ------------------------------------
   🌈 BACKGROUND
------------------------------------ */
body{
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(150deg,#ffe9f8,#ffd4ef,#ffb3df,#d7a8ff);
    background-size:300% 300%;
    animation:bgShift 16s infinite alternate ease-in-out;
    font-family:'Poppins',sans-serif;
}
@keyframes bgShift{
    0%{background-position:0 0;}
    100%{background-position:100% 100%;}
}

/* ------------------------------------
   ☁ CLOUDS
------------------------------------ */
.cloud{
    position:fixed;
    width:260px;
    opacity:0.28;
    animation:drift 55s linear infinite;
}
@keyframes drift{
    0%{left:-25%;}
    100%{left:120%;}
}

/* ------------------------------------
   ⭐ STARS
------------------------------------ */
.star{
    position:fixed;
    width:4px;height:4px;
    background:white;
    border-radius:50%;
    animation:starBlink 2.2s infinite alternate;
    box-shadow:0 0 10px white;
}
@keyframes starBlink{
    0%{opacity:0.1;}
    100%{opacity:1;}
}

/* ------------------------------------
   🌸 FLOWERS
------------------------------------ */
.flower{
    position:fixed;
    font-size:25px;
    opacity:0.85;
    animation:flowerFloat 13s linear infinite;
}
@keyframes flowerFloat{
    0%{transform:translateY(120vh) rotate(0deg);}
    100%{transform:translateY(-20vh) rotate(360deg);}
}

/* ------------------------------------
   📝 STICKY NOTES
------------------------------------ */
.sticky{
    position:absolute;
    width:260px;
    padding:22px;
    background:var(--color);
    border-radius:10px;
    font-size:19px;
    color:#444;
    font-weight:500;
    filter:drop-shadow(5px 7px 3px rgba(0,0,0,0.25));
    opacity:0;
    animation:notePOP 1s ease-out forwards;
    z-index:5;
}
@keyframes notePOP{
    0%{opacity:0; transform:scale(0.2) rotate(-10deg);}
    60%{opacity:1; transform:scale(1.1) rotate(5deg);}
    100%{opacity:1; transform:scale(1) rotate(var(--rot));}
}

/* ------------------------------------
   🕺 DANCING CARTOONS (NEW!)
------------------------------------ */
#cartoonStrip{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:25px;
    font-size:45px;
    z-index:20;
}

#cartoonStrip span{
    animation:dance 1.2s infinite ease-in-out;
    display:inline-block;
}

@keyframes dance{
    0%{transform:translateY(0px) rotate(0deg);}
    30%{transform:translateY(-10px) rotate(-5deg);}
    60%{transform:translateY(5px) rotate(5deg);}
    100%{transform:translateY(0px) rotate(0deg);}
}

/* ------------------------------------
   🎉 FINAL BUTTON
------------------------------------ */
#nextBtn{
    display:none;
    padding:14px 40px;
    background:white;
    position:fixed;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    color:#ff2fb2;
    font-size:20px;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 0 30px white;
    animation:btnPop 1s forwards;
    z-index:30;
}
@keyframes btnPop{
    0%{opacity:0; transform:translateY(20px) translateX(-50%);}
    100%{opacity:1; transform:translateY(0) translateX(-50%);}
}

/* ------------------------------------
   🎁 FINAL POPUP
------------------------------------ */
#popup{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(6px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#popupBox{
    width:85%;
    max-width:380px;
    background:white;
    padding:30px;
    border-radius:22px;
    color:#ff2fb2;
    font-size:20px;
    text-align:center;
    animation:zoomIn 1s ease-out forwards;
}
@keyframes zoomIn{
    0%{opacity:0; transform:scale(0.4);}
    100%{opacity:1; transform:scale(1);}
}

/* ------------------------------------
   💥 BLASTS
------------------------------------ */
.bigSpark{
    position:fixed;
    width:22px; height:22px;
    background:radial-gradient(circle,white,rgba(255,255,255,0));
    border-radius:50%;
    animation:blast 1.6s ease-out forwards;
    z-index:50;
}
@keyframes blast{
    from{transform:scale(0.3); opacity:1;}
    to{transform:scale(4); opacity:0;}
}
</style>
</head>

<body>

<!-- CLOUDS -->
<img src="https://i.ibb.co/vcLfTqT/cloud.png" class="cloud" style="top:10%;">
<img src="https://i.ibb.co/vcLfTqT/cloud.png" class="cloud" style="top:50%; animation-delay:15s;">
<img src="https://i.ibb.co/vcLfTqT/cloud.png" class="cloud" style="top:30%; animation-delay:30s;">

<!-- ⭐ STARS -->
<script>
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.animationDelay=Math.random()*3+"s";
    document.body.appendChild(s);
}
</script>

<!-- 🌸 FLOWERS -->
<script>
let flowers=["🌸","🌺","🌼","💮"];
for(let i=0;i<20;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.innerHTML=flowers[Math.floor(Math.random()*4)];
    f.style.left=Math.random()*100+"vw";
    f.style.animationDelay=Math.random()*8+"s";
    document.body.appendChild(f);
}
</script>

<!-- 🕺 DANCING CARTOONS -->
<div id="cartoonStrip">
    <span>🐼</span>
    <span>🐰</span>
    <span>🐸</span>
    <span>🐻</span>
    <span>🐹</span>
    <span>🐥</span>
</div>

<!-- FINAL BUTTON -->
<div id="nextBtn">Final Wish 🎉</div>

<!-- POPUP -->
<div id="popup">
    <div id="popupBox">
        <h2>🎉 Happy Birthday Bestie 💛</h2>
        <p>You’re a whole vibe.  
        Thank you for being the chaos, the comfort,  
        the fun & the smile in my life ✨  
        Stay awesome, stay bright 🌸</p>
    </div>
</div>

<!-- MUSIC -->
<audio id="music" autoplay loop>
    <source src="music1.mpeg" type="audio/mpeg">
</audio>

<script>
/* ✅ Sticky Notes */
let msgs=[
    "msg1",
    "msg2",
    "msg3",
    "msg4",
    "msg5 💕"
];

let colors=["#fff6a8","#ffd8ef","#d6f2ff","#dcffdf","#ffeac8"];

/* ✅ Non-overlapping positions */
let positions = [
    {left: "12vw", top: "18vh"},
    {left: "60vw", top: "15vh"},
    {left: "20vw", top: "55vh"},
    {left: "65vw", top: "50vh"},
    {left: "38vw", top: "30vh"}
];

/* ✅ Show notes */
function showAllNotes(){
    msgs.forEach((msg,i)=>{
        setTimeout(()=>{
            let note=document.createElement("div");
            note.className="sticky";
            note.innerText=msg;

            note.style.setProperty("--color",colors[i]);

            note.style.setProperty("--rot",
                (Math.random()*8 - 4)+"deg"
            );

            note.style.left=positions[i].left;
            note.style.top=positions[i].top;

            document.body.appendChild(note);

        }, i*400);
    });

    setTimeout(()=>{
        nextBtn.style.display="block";
    }, msgs.length*450);
}
showAllNotes();

/* ✅ Dancing cartoon wiggle */
setInterval(()=>{
    document.querySelectorAll("#cartoonStrip span").forEach(sp=>{
        let y=(Math.random()*10)-5;
        let r=(Math.random()*20)-10;
        sp.style.transform=`translateY(${y}px) rotate(${r}deg)`;
    });
}, 500);

/* ✅ Button → Blast → Popup */
nextBtn.onclick = ()=>{
    for(let i=0;i<60;i++){
        let sp=document.createElement("div");
        sp.className="bigSpark";
        sp.style.left=Math.random()*100+"vw";
        sp.style.top=Math.random()*100+"vh";
        document.body.appendChild(sp);
        setTimeout(()=>sp.remove(),1600);
    }

    setTimeout(()=>popup.style.display="flex",1000);
};
</script>

</body>
</html>
