<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surprise Box 🎁</title>

<style>
*{
  box-sizing:border-box;
  touch-action:manipulation;
}

body{
  margin:0;
  overflow:hidden;
  height:100vh;
  font-family:'Poppins',sans-serif;

  background:linear-gradient(150deg,#ffe9f8,#ffd4ef,#ffb3df,#d7a8ff);
  background-size:300% 300%;
  animation:bgShift 16s infinite alternate ease-in-out;
}

@keyframes bgShift{
  0%{background-position:0 0;}
  100%{background-position:100% 100%;}
}

/* 🎁 TITLE */
#title{
  position:fixed;
  top:12px;
  width:100%;
  text-align:center;
  font-size:clamp(20px,5vw,30px);
  font-weight:700;
  background:linear-gradient(90deg,#ff2fb2,#ff8ae6,#ffffff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  z-index:100;
}

/* ⭐ STARS */
.star{
  position:fixed;
  width:3px;height:3px;
  background:white;
  border-radius:50%;
  animation:blink 2s infinite alternate;
}
@keyframes blink{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* 🌸 FLOWERS */
.flower{
  position:fixed;
  font-size:clamp(16px,4vw,22px);
  animation:floatUp 12s linear forwards;
}
@keyframes floatUp{
  from{transform:translateY(100vh);}
  to{transform:translateY(-20vh) rotate(360deg);}
}

/* 📝 NOTES */
.sticky{
  position:absolute;
  width:min(260px,85vw);
  padding:16px;

  background:linear-gradient(135deg,#ffffff,#ffe6f2);
  border-radius:16px;

  font-size:clamp(14px,3.5vw,17px);
  line-height:1.5;
  color:#4a2a3a;
  white-space:pre-line;

  box-shadow:0 10px 25px rgba(0,0,0,0.25);

  opacity:0;
  animation:notePOP 0.7s forwards;

  cursor:grab;
  touch-action:none;
  z-index:10;
}

@keyframes notePOP{
  from{opacity:0; transform:scale(0.3);}
  to{opacity:1; transform:scale(1) rotate(var(--rot));}
}

/* ✍️ CURSOR */
.typing-cursor{
  width:2px;
  height:1em;
  background:#ff2fb2;
  display:inline-block;
  animation:blink 1s infinite;
}

/* 🎉 BUTTON */
#nextBtn{
  display:none;
  position:fixed;
  bottom:clamp(20px,6vh,60px);
  left:50%;
  transform:translateX(-50%);
  padding:12px 28px;
  font-size:clamp(14px,4vw,18px);

  background:white;
  border-radius:30px;
  color:#ff2fb2;
  cursor:pointer;
  z-index:50;
}

/* 🎁 POPUP */
#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:99999;
}

#popupBox{
  width:100%;
  max-width:360px;
  background:white;
  padding:24px;
  border-radius:20px;
  text-align:center;
  color:#ff2fb2;
  font-size:clamp(14px,4vw,18px);
}

/* 💥 BLAST */
.bigSpark{
  position:fixed;
  width:18px;height:18px;
  background:radial-gradient(circle,white,transparent);
  border-radius:50%;
  animation:blast 1.4s forwards;
}
@keyframes blast{
  to{transform:scale(4); opacity:0;}
}
</style>
</head>

<body>

<div id="title">Surprise Box 🎁</div>

<div id="nextBtn">Final Wish 🎉</div>

<div id="popup">
  <div id="popupBox">
    <h2>🎉 Happy Birthday Poohhhhh 💛</h2>
    <p>
      You mean more than words can say ✨<br>
      Thank you for being my chaos, comfort & happiness 💕<br>
      Stay magical 🌸… always special<br>
      Happy Birthday Once Again 🎂
    </p>
  </div>
</div>

<audio id="music" loop>
  <source src="music1.mpeg">
</audio>

<script>

/* 🎵 MUSIC */
document.addEventListener("click",()=>{
  music.play().catch(()=>{});
},{once:true});

/* ⭐ STARS */
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

/* 🌸 FLOWERS */
setInterval(()=>{
 let f=document.createElement("div");
 f.className="flower";
 f.innerText=["🌸","🌺","🌼"][Math.floor(Math.random()*3)];
 f.style.left=Math.random()*100+"vw";
 document.body.appendChild(f);
 setTimeout(()=>f.remove(),12000);
},700);

/* 💖 MESSAGES */
let msgs=[

`These shoes 👟💖 are just a small gift…
but your journey is something truly special ✨
So always remember—
देखणी ती पाऊले
जी ध्यासपंथे चालती ।
वाळवंटातूनसुद्धा
स्वस्तिपद्मे रेखिती ॥
Some steps don’t just walk…
they leave magic behind 💫`,

`I didn’t just gift you a bracelet… ✨💖
I wrapped a little sparkle for your hands…
Because—
देखणे ते हात ज्यांना
निर्मितीचे डोहळे ।
मंगलाने गंधलेले
सुंदराचे सोहळे ॥
Let this shine remind you…
your hands aren’t just beautiful—
they create magic 💫`,

`This dress 👗💖 is just a small addition in your wardrobe
because the real beauty is already yours ✨
देखणे ते चेहरे
जे प्रांजळाचे आरसे ।
गोरटे की सावळे
या मोल नाही फारसे ॥
Some people don’t need to look beautiful…
they just are 💫`,

`A little style for your eyes 🕶️💖
but the real beauty was always yours so remember.....
तेच डोळे देखणे
जे कोंडीती सार्‍या नभा ।
वोळिती दुःखे जनांच्या
सांडिती नेत्रप्रभा ॥
Some eyes don’t just look…
they feel, they shine, they heal ✨`,

`Finally 
Gifts are temporary 🎁
But you… you’re something truly special 💖✨
Never forget that 🌸`
];

/* 📍 RANDOM POSITIONS SAFE */
function randomPos(){
  return {
    left:Math.random()*70 + 5 + "vw",
    top:Math.random()*60 + 10 + "vh"
  };
}

/* 🖐️ DRAG (MOBILE + DESKTOP) */
function makeDraggable(el){
 let isDown=false,offX=0,offY=0;

 function start(e){
  isDown=true;
  let x=e.touches?e.touches[0].clientX:e.clientX;
  let y=e.touches?e.touches[0].clientY:e.clientY;
  offX=x-el.offsetLeft;
  offY=y-el.offsetTop;
 }

 function move(e){
  if(!isDown) return;
  e.preventDefault();
  let x=e.touches?e.touches[0].clientX:e.clientX;
  let y=e.touches?e.touches[0].clientY:e.clientY;
  el.style.left=(x-offX)+"px";
  el.style.top=(y-offY)+"px";
 }

 function end(){ isDown=false; }

 el.addEventListener("mousedown",start);
 el.addEventListener("touchstart",start);

 document.addEventListener("mousemove",move);
 document.addEventListener("touchmove",move,{passive:false});

 document.addEventListener("mouseup",end);
 document.addEventListener("touchend",end);
}

/* ✍️ FAST TYPING */
function typeText(el,text,cb){
 let i=0;

 function t(){
  if(i<text.length){
   el.innerHTML += text[i];

   let speed = 10;
   if([".",",","…","—","।"].includes(text[i])) speed = 60;

   i++;
   setTimeout(t,speed);
  } else cb && cb();
 }

 t();
}

/* 🎬 SEQUENCE */
let i=0;

function showNext(){
 if(i>=msgs.length){
  nextBtn.style.display="block";
  return;
 }

 let pos=randomPos();

 let n=document.createElement("div");
 n.className="sticky";
 n.style.left=pos.left;
 n.style.top=pos.top;
 n.style.setProperty("--rot",(Math.random()*8-4)+"deg");

 document.body.appendChild(n);
 makeDraggable(n);

 typeText(n,msgs[i],()=>{
  i++;
  setTimeout(showNext,400);
 });
}

showNext();

/* 🎉 FINAL */
nextBtn.onclick=()=>{
 document.querySelectorAll(".sticky").forEach(n=>n.remove());

 for(let i=0;i<60;i++){
  let b=document.createElement("div");
  b.className="bigSpark";
  b.style.left=Math.random()*100+"vw";
  b.style.top=Math.random()*100+"vh";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),1400);
 }

 setTimeout(()=>{
  popup.style.display="flex";
 },700);
};

</script>

</body>
</html>
