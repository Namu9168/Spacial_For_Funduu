<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Magic Shop Finale 💜</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

*{
  box-sizing:border-box;
  /* Changed to manipulation to allow zooming if needed but keep dragging smooth */
  touch-action: manipulation; 
}

body{
  margin:0;
  overflow:hidden;
  height:100vh;
  width: 100vw;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at center, #2e1065 0%, #0f051d 100%);
  background-size: cover;
}

/* 🌌 CREATIVE BTS TITLE */
#title{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  font-family: 'Dancing Script', cursive;
  font-size:clamp(24px,7vw,45px);
  background: linear-gradient(to right, #d8b4fe, #ffffff, #d8b4fe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 8px rgba(216, 180, 254, 0.6));
  z-index: 1000;
  pointer-events: none;
  padding: 0 10px;
}

/* ⭐ TWINKLING GALAXY */
.star{
  position:fixed;
  background:white;
  border-radius:50%;
  animation: blink var(--d) infinite alternate;
}
@keyframes blink{ from{opacity:0.2;} to{opacity:1;} }

/* 📝 DRAGGABLE POLAROIDS (Your Messages) */
.sticky{
  position:absolute;
  width:min(280px, 85vw);
  max-height: 70vh; /* Prevents note from being longer than screen */
  overflow-y: auto; /* Allows scrolling inside note if text is long on small phones */
  padding:15px 15px 45px 15px; 
  background: #ffffff;
  border-radius: 2px;
  font-size: clamp(13px, 3.5vw, 15px);
  line-height: 1.6;
  color: #1e1b4b;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  opacity: 0;
  animation: notePOP 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  cursor: grab;
  z-index: 10;
  border: 1px solid rgba(0,0,0,0.05);
  white-space: pre-line;
  scrollbar-width: none; /* Hide scrollbar for aesthetics */
}
.sticky::-webkit-scrollbar { display: none; }

.sticky:active { cursor: grabbing; transform: scale(1.05); transition: transform 0.2s; }

@keyframes notePOP{ from{opacity:0; transform:scale(0.5)} to{opacity:1; transform:scale(1) rotate(var(--rot))} }

/* 🎉 FINAL BUTTON */
#nextBtn{
  display:none;
  position:fixed;
  bottom: 40px; left:50%;
  transform:translateX(-50%);
  padding: 12px 35px;
  font-size: 18px;
  font-weight: 600;
  background: #7c3aed;
  border: 2px solid #fff;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(124, 58, 237, 0.5);
  z-index: 2000;
  white-space: nowrap;
}

/* 🎁 CREATIVE FINAL POPUP */
#popup{
  position:fixed;
  inset:0;
  background: rgba(15, 5, 29, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index: 99999;
}

#popupBox{
  width: 100%;
  max-width: 400px;
  background: #fff;
  padding: clamp(25px, 8vw, 40px) 20px;
  border-radius: 30px;
  text-align: center;
  border: 5px solid #a78bfa;
  position: relative;
  box-shadow: 0 0 60px rgba(167, 139, 250, 0.4);
}

#popupBox h2 { 
  font-family: 'Dancing Script', cursive; 
  font-size: clamp(28px, 8vw, 36px); 
  margin-bottom: 15px;
  color: #6d28d9;
}

#popupBox p { font-size: clamp(14px, 4vw, 17px); color: #4b5563; line-height: 1.6; margin: 0; }

/* 🎆 CELEBRATION PARTICLES */
.particle {
  position: fixed;
  z-index: 100000;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="title">For the girl who deserves the whole galaxy 💛 </div>
<button id="nextBtn">Open Final Wish! ✨</button>

<div id="popup">
  <div id="popupBox">
    <h2>🎉 Happy Birthday Poohhhhh 💛</h2>
    <p>
      You mean more than words can say ✨<br>
      Thank you for being my chaos, comfort & happiness 💕<br>
      Stay magical 🌸… always special<br><br>
      <strong>Happy Birthday Once Again 🎂</strong>
    </p>
  </div>
</div>

<audio id="music" loop><source src="music1.mpeg"></audio>

<script>
/* 🎵 MUSIC */
document.addEventListener("click", () => { document.getElementById("music").play().catch(()=>{}); }, {once:true});

/* ✨ GALAXY */
for(let i=0; i<100; i++){
  let s = document.createElement("div");
  s.className="star";
  let size = Math.random()*2.5;
  s.style.width=size+"px"; s.style.height=size+"px";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.setProperty("--d", (Math.random()*3+1)+"s");
  document.body.appendChild(s);
}

const msgs = [
`These shoes 👟💖 are just a small gift…
but your journey is something truly special ✨
So always remember—
देखणी ती पाऊले
जी ध्यासपंथे चालती ।
वाळवंटातूनसुद्धा
स्वस्तिपद्मे रेखिती ॥
Some steps don’t just walk…
they leave magic behind 💫`,

`I didn’t just gift you a bracelet… ✨💖
I wrapped a little sparkle for your hands…
Because—
देखणे ते हात ज्यांना
निर्मितीचे डोहळे ।
मंगलाने गंधलेले
सुंदराचे सोहळे ॥
Let this shine remind you…
your hands aren’t just beautiful—
they create magic 💫`,

`This dress 👗💖 is just a small addition in your wardrobe
because the real beauty is already yours ✨
देखणे ते चेहरे
जे प्रांजळाचे आरसे ।
गोरटे की सावळे
या मोल नाही फारसे ॥
Some people don’t need to look beautiful…
they just are 💫`,

`A little style for your eyes 🕶️💖
but the real beauty was always yours so remember.....
तेच डोळे देखणे
जे कोंडीती सार्‍या नभा ।
वोळिती दुःखे जनांच्या
सांडिती नेत्रप्रभा ॥
Some eyes don’t just look…
they feel, they shine, they heal ✨`,

`Finally 
Gifts are temporary 🎁
But you… you’re something truly special 💖✨
Never forget that 🌸`
];

/* 🖐️ DRAG LOGIC */
function makeDraggable(el) {
    let curX = 0, curY = 0;
    
    el.onmousedown = dragStart;
    el.ontouchstart = dragStart;

    function dragStart(e) {
        // Prevent scrolling when trying to drag on mobile
        if(e.type === "touchstart") {
           curX = e.touches[0].clientX;
           curY = e.touches[0].clientY;
        } else {
           curX = e.clientX;
           curY = e.clientY;
        }
        document.onmouseup = dragEnd;
        document.ontouchend = dragEnd;
        document.onmousemove = dragMove;
        document.ontouchmove = dragMove;
        el.style.zIndex = 1001; 
    }

    function dragMove(e) {
        e.preventDefault(); // Important for mobile dragging
        let clientX = e.clientX || (e.touches ? e.touches[0].clientX : curX);
        let clientY = e.clientY || (e.touches ? e.touches[0].clientY : curY);
        
        let moveX = curX - clientX;
        let moveY = curY - clientY;
        curX = clientX;
        curY = clientY;
        el.style.top = (el.offsetTop - moveY) + "px";
        el.style.left = (el.offsetLeft - moveX) + "px";
    }

    function dragEnd() {
        document.onmouseup = null; document.onmousemove = null;
        document.ontouchend = null; document.ontouchmove = null;
    }
}

/* ✍️ SEQUENCE */
let msgIdx = 0;
function showNext() {
  if(msgIdx >= msgs.length) {
    document.getElementById("nextBtn").style.display = "block";
    return;
  }
  
  let n = document.createElement("div");
  n.className = "sticky";
  
  // Responsive positioning logic
  let xBase = window.innerWidth < 600 ? 5 : 15;
  let yBase = window.innerWidth < 600 ? 15 : 20;
  
  n.style.left = (xBase + (msgIdx * 7) % 30) + "vw";
  n.style.top = (yBase + (msgIdx * 10) % 40) + "vh";
  n.style.setProperty("--rot", (Math.random()*16-8)+"deg");
  document.body.appendChild(n);
  makeDraggable(n);
  
  let i = 0;
  function type() {
    if(i < msgs[msgIdx].length) {
      n.innerHTML += msgs[msgIdx][i++];
      setTimeout(type, 25);
    } else {
      msgIdx++;
      setTimeout(showNext, 1200);
    }
  }
  type();
}
window.onload = showNext;

/* 🎆 CONTINUOUS CELEBRATION */
function startCelebration() {
    const icons = ["💜", "✨", "🌸", "⭐", "🎉"];
    
    // Continuous Rain
    setInterval(() => {
        let p = document.createElement("div");
        p.className = "particle";
        p.innerText = icons[Math.floor(Math.random()*icons.length)];
        p.style.fontSize = Math.random()*20+20+"px";
        p.style.left = Math.random()*100+"vw";
        p.style.top = "-50px";
        
        p.animate([
            { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
            { transform: `translateY(110vh) rotate(${Math.random()*720}deg)`, opacity: 0 }
        ], { duration: 3000 + Math.random()*2000 });
        
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
    }, 150);

    // Continuous Explosions
    setInterval(() => {
        for(let i=0; i<15; i++) {
            let p = document.createElement("div");
            p.className = "particle";
            p.innerText = icons[Math.floor(Math.random()*icons.length)];
            p.style.left = "50%"; p.style.top = "50%";
            let angle = Math.random() * Math.PI * 2;
            let dist = Math.random() * (window.innerWidth < 600 ? 200 : 400) + 100;
            
            p.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }
            ], { duration: 1500 });

            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1500);
        }
    }, 2000);
}

const nextBtn = document.getElementById("nextBtn");
nextBtn.onclick = () => {
  nextBtn.style.display = "none";
  document.getElementById("popup").style.display = "flex";
  startCelebration();
};

</script>
</body>
</html>
