<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>First page</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:white;
}

/* START SCREEN */
#tapStart{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    text-align:center;
}

/* VIDEO */
#bgVideo{
    position:fixed;
    top:50%; left:50%;
    min-width:100%; min-height:100%;
    transform:translate(-50%,-50%);
    object-fit:cover;
    z-index:-2;
}

#pinkOverlay{
    position:fixed;
    inset:0;
    background: radial-gradient(circle, rgba(255,120,200,0.25), rgba(0,0,0,0.8));
    z-index:-1;
}

/* TITLE */
h1{
    text-align:center;
    margin-top:40px;
    font-size:clamp(28px,6vw,52px);
    background: linear-gradient(90deg,#ff4da6,#ffd6f5,#ff9ae8,#ff4da6);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(255,120,200,0.6);
    opacity:0;
    transform:translateY(-120px);
    animation:gradientMove 6s infinite linear;
}
@keyframes gradientMove{
    100%{background-position:300%;}
}

/* CENTER */
.container{
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:5;
}

/* CHAT */
#chatArea{
    display:flex;
    flex-direction:column;
    align-items:center;
}
.chat{
    background:#dcf8c6;
    color:black;
    padding:10px 14px;
    margin:8px;
    border-radius:20px;
    opacity:0;
    transform:translateY(30px);
}

/* CAKE */
#cake{
    font-size:100px;
    display:none;
    opacity:0;
    cursor:pointer;
    margin-top:20px;
}

/* CONFETTI – ABOVE POPUP ✅ */
.confetti{
    position:fixed;
    width:8px;
    height:12px;
    background:hsl(calc(var(--i)*36),90%,60%);
    top:-10px;
    left:calc(var(--x)*1%);
    animation:fall linear forwards;
    z-index:20001;
    pointer-events:none;
}
@keyframes fall{
    to{transform:translateY(120vh) rotate(720deg);}
}

/* FIREWORKS – ABOVE POPUP ✅ */
.firework{
    position:fixed;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    animation:explode 1s forwards;
    z-index:20001;
    pointer-events:none;
}
@keyframes explode{
    to{transform:scale(8);opacity:0;}
}

/* POPUP */
#popupOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:20000;
}

#popupBox{
    background:white;
    color:#ff4da6;
    padding:25px;
    border-radius:20px;
    text-align:center;
}

#popupBtn{
    margin-top:15px;
    padding:10px 20px;
    background:#ff4da6;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="tapStart">
    <h2>✨ Tap to Start Magic ✨</h2>
</div>

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="video2.mp4" type="video/mp4">
</video>

<div id="pinkOverlay"></div>

<audio id="music" loop>
    <source src="music1.mpeg" type="audio/mpeg">
</audio>

<h1 id="title">🎉 Happy Birthday Pooohhhho 🎉</h1>

<div class="container">
    <div id="chatArea"></div>
    <div id="cake">🎂</div>
</div>

<div id="popupOverlay">
    <div id="popupBox">
        <p>Happyyyy Birthday 💖<br>You are amazing ✨</p>
        <button id="popupBtn">Next Surprise 💕</button>
    </div>
</div>

<script>
const tapStart=document.getElementById("tapStart");
const music=document.getElementById("music");
const title=document.getElementById("title");
const chatArea=document.getElementById("chatArea");
const cake=document.getElementById("cake");
const popupOverlay=document.getElementById("popupOverlay");
const popupBtn=document.getElementById("popupBtn");

tapStart.onclick=startExp;
tapStart.ontouchstart=startExp;

function startExp(){
    tapStart.style.display="none";
    music.muted=false;
    music.play().catch(()=>{});
    gsap.to(title,{y:0,opacity:1,duration:1.5,ease:"bounce.out"});
    startChat();
}

const msgs=[
"Hiiiiiiiiii 🤗🎀",
"Today is your special day 😻",
"You deserve everything ✨",
"Stay happy always 🌸",
"Click the cake 🎂"
];
let i=0;

function startChat(){
    let interval=setInterval(()=>{
        if(i<msgs.length){
            let c=document.createElement("div");
            c.className="chat";
            c.innerText=msgs[i];
            chatArea.appendChild(c);
            gsap.to(c,{opacity:1,y:0});
            i++;
        }else{
            clearInterval(interval);
            setTimeout(showCake,1000);
        }
    },1200);
}

function showCake(){
    cake.style.display="block";
    gsap.to(cake,{opacity:1,scale:1.1});
}

cake.onclick=celebrate;
cake.ontouchstart=celebrate;

function celebrate(){
    startConfetti();
    startFireworks();
    popupOverlay.style.display="flex";
}

function startConfetti(){
    setInterval(()=>{
        for(let i=0;i<15;i++){
            let c=document.createElement("div");
            c.className="confetti";
            c.style.setProperty("--x",Math.random()*100);
            c.style.setProperty("--i",Math.random()*10);
            c.style.animationDuration=(2+Math.random()*2)+"s";
            document.body.appendChild(c);
            setTimeout(()=>c.remove(),4000);
        }
    },300);
}

function startFireworks(){
    setInterval(()=>{
        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight/2;
        for(let i=0;i<18;i++){
            let f=document.createElement("div");
            f.className="firework";
            f.style.left=x+"px";
            f.style.top=y+"px";
            document.body.appendChild(f);
            setTimeout(()=>f.remove(),900);
        }
    },700);
}

popupBtn.onclick=()=>{
    window.location.href="photo_wall_page.html";
};
</script>

</body>
</html>
