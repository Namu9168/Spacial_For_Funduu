<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Magic Entrance 💜</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
:root {
    --bts-purple: #6d4a94;
    --bts-light: #bb93e4;
    --gold: #ffcc00;
}

body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    background: #000;
    color: white;
    width: 100vw;
    height: 100vh;
    touch-action: manipulation;
    user-select: none;
}

/* DECORATIONS */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
}

.butterfly {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    z-index: 2;
    filter: drop-shadow(0 0 8px var(--bts-light));
}

@keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(0.3); }
}

.butterfly-wings {
    display: inline-block;
    animation: flap 0.2s infinite;
}

/* START SCREEN */
#tapStart {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: pointer;
    text-align: center;
    padding: 20px;
}

.start-gif {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
    opacity: 0.6;
}

#bgVideo {
    position: fixed;
    top: 50%; left: 50%;
    width: 100vw;
    height: 100vh;
    transform: translate(-50%, -50%);
    object-fit: cover;
    z-index: -2;
    opacity: 0.5;
}

#purpleOverlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(109, 74, 148, 0.4), rgba(0, 0, 0, 0.85));
    z-index: -1;
}

h1 {
    position: relative;
    text-align: center;
    margin-top: 5vh;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(28px, 7vw, 60px);
    background: linear-gradient(90deg, var(--bts-light), #fff, var(--gold), var(--bts-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    z-index: 10;
    padding: 0 10px;
}

@keyframes shine { to { background-position: 200% center; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.container {
    position: absolute;
    top: 55%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 500px;
    text-align: center;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.chat {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 10px 18px;
    margin: 8px auto;
    border-radius: 18px 18px 18px 2px;
    opacity: 0;
    width: fit-content;
    max-width: 85%;
    font-size: clamp(14px, 4vw, 18px);
    border: 1px solid rgba(255,255,255,0.1);
}

#cake {
    font-size: clamp(80px, 20vw, 120px);
    display: none;
    opacity: 0;
    cursor: pointer;
    filter: drop-shadow(0 0 20px var(--gold));
    margin-top: 20px;
    transition: transform 0.3s;
}

#cake:active { transform: scale(0.9); }

/* CELEBRATION POPUP */
#popupOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 20000;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
}

#popupBox {
    background: white;
    color: var(--bts-purple);
    padding: 30px;
    border-radius: 30px;
    text-align: center;
    box-shadow: 0 0 40px var(--bts-light);
    transform: scale(0);
    width: 85%;
    max-width: 350px;
    border: 5px solid var(--bts-light);
}

#popupBox h2 {
    font-family: 'Dancing Script', cursive;
    font-size: 2.2rem;
    margin: 15px 0 10px;
    background: linear-gradient(45deg, var(--bts-purple), #ff007f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

#popupBtn {
    margin-top: 20px;
    padding: 12px 35px;
    background: linear-gradient(45deg, var(--bts-purple), var(--bts-light));
    color: white;
    font-weight: bold;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    width: 100%;
}
</style>
</head>

<body>

<div id="tapStart">
    <img class="start-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZm9kcjlybm1md3Q0aDFocW9uajNxZXowaXcxY2JzMm1zbXM1czJrcCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/RuImRB4yz7BMLdvqCO/giphy.gif">
    <h2 style="color:white; font-family:'Dancing Script'; font-size:2.8rem; position:relative; z-index:10;">✨ Enter the Magic Shop ✨</h2>
    <p style="color: var(--bts-light); animation: pulse 1.5s infinite; position:relative; z-index:10;">Tap to begin journey...</p>
</div>

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="video2.mp4" type="video/mp4">
</video>

<div id="purpleOverlay"></div>

<audio id="music" loop>
    <source src="music1.mpeg" type="audio/mpeg">
</audio>

<h1 id="title">🎉 Happie Birthday Poohhhhhooooo 🎉</h1>

<div class="container">
    <div id="chatArea"></div>
    <div id="cake">🎂</div>
</div>

<div id="popupOverlay">
    <div id="popupBox">
        <img src="https://media.giphy.com/media/v1.Y2lkPWVjZjA1ZTQ3MzNkejd0cmxzaTNtZDdxdG9kZDRmazh1azM2bmJ0M3gzY3hldmRsYyZlcD12MV9naWZzX3NlYXJjaCZjdD1n/DyGHl5qgnmdPetbxDb/giphy.gif" width="100">
        <h2>Hooray! 💜</h2>
        <p style="font-size: 0.95rem;"><b>Happy Birthday Poohhhhhooooo!</b><br>The universe is celebrating YOU today!</p>
        <button id="popupBtn">Next Surprise ✨</button>
    </div>
</div>

<script>
const tapStart = document.getElementById("tapStart");
const music = document.getElementById("music");
const title = document.getElementById("title");
const chatArea = document.getElementById("chatArea");
const cake = document.getElementById("cake");
const popupOverlay = document.getElementById("popupOverlay");
const popupBox = document.getElementById("popupBox");

function createDecorations() {
    const starCount = window.innerWidth < 768 ? 25 : 50; 
    for (let i = 0; i < starCount; i++) {
        let star = document.createElement("div");
        star.className = "star";
        let size = Math.random() * 3 + 1 + "px";
        star.style.width = size;
        star.style.height = size;
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        document.body.appendChild(star);
        gsap.to(star, { opacity: Math.random(), duration: Math.random() * 2 + 1, repeat: -1, yoyo: true });
    }
    const icons = ["🦋", "✨", "💜"];
    for (let i = 0; i < 6; i++) {
        let b = document.createElement("div");
        b.className = "butterfly";
        b.innerHTML = `<span class="butterfly-wings">${icons[i % icons.length]}</span>`;
        document.body.appendChild(b);
        animateButterfly(b);
    }
}

function animateButterfly(el) {
    gsap.set(el, { x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight });
    gsap.to(el, {
        x: Math.random() * (window.innerWidth - 30),
        y: Math.random() * (window.innerHeight - 30),
        duration: Math.random() * 5 + 5,
        ease: "sine.inOut",
        onComplete: () => animateButterfly(el)
    });
}

tapStart.onclick = () => {
    gsap.to(tapStart, { opacity: 0, duration: 1, onComplete: () => tapStart.remove() });
    music.play().catch(()=>{ console.log("Audio needs user interaction first")});
    gsap.to(title, { y: 0, opacity: 1, duration: 2 });
    createDecorations();
    startChat();
};

const msgs = [
    "Annyeong! 🤗🎀", 
    "Today the stars align for you ✨", 
    "You’re a limited edition human 🌸", 
    "Stay gold, stay happy! 💜", 
    "Make a wish and tap the cake 🎂"
];

let msgIndex = 0;
function startChat(){
    let interval = setInterval(()=>{
        if(msgIndex < msgs.length){
            let c = document.createElement("div");
            c.className = "chat";
            c.innerText = msgs[msgIndex++];
            chatArea.appendChild(c);
            gsap.fromTo(c, {opacity:0, scale:0.8, y:20}, {opacity:1, scale:1, y:0, duration:0.6});
            
            // Scroll to bottom if content exceeds view
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            clearInterval(interval);
            setTimeout(()=>{ 
                cake.style.display="block"; 
                gsap.to(cake,{opacity:1, duration:1, scale: 1.1, repeat: -1, yoyo: true}); 
            }, 500);
        }
    }, 1600);
}

cake.onclick = () => {
    const count = 150;
    const defaults = { origin: { y: 0.7 }, zIndex: 21000 };
    
    function fire(particleRatio, opts) {
        confetti(Object.assign({}, defaults, opts, {
            particleCount: Math.floor(count * particleRatio)
        }));
    }
    
    fire(0.25, { spread: 26, startVelocity: 55 });
    fire(0.2, { spread: 60 });
    fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
    fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });

    const end = Date.now() + (3 * 1000);
    const colors = ['#6d4a94', '#bb93e4', '#ffffff', '#ffcc00'];
    (function frame() {
        confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
        confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
        if (Date.now() < end) { requestAnimationFrame(frame); }
    }());

    popupOverlay.style.display = "flex";
    gsap.to(popupBox, { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.7)" });
};

document.getElementById("popupBtn").onclick = () => {
    window.location.href = "photo_wall_page.html";
};
</script>

</body>
</html>
