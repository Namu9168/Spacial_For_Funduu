<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Surprise 💖</title>

<style>
body{
    margin:0;
    background: radial-gradient(circle,#ff9bdc,#6a0572);
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    color:white;
    text-align:center;
}

/* 🎁 Gift Box */
#gift{
    font-size:100px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    animation:bounce 1.5s infinite;
}
@keyframes bounce{
    0%{transform:translate(-50%,-50%) translateY(0);}
    50%{transform:translate(-50%,-50%) translateY(-15px);}
    100%{transform:translate(-50%,-50%) translateY(0);}
}

/* 🔐 Password Box */
#password-box{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}
#password-box div{
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
}
input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
}
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4dcc;
    color:white;
    cursor:pointer;
}

/* 💌 Messages */
#messages{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80%;
    font-size:22px;
    line-height:1.5;
    animation:fade 1s;
}
@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>
</head>

<body>

<!-- 🎁 Gift -->
<div id="gift">🎁</div>

<!-- 🔐 Password -->
<div id="password-box">
    <div>
        <h3>Enter Password 💖</h3>
        <input type="password" id="pass">
        <br>
        <button onclick="checkPass()">Unlock</button>
    </div>
</div>

<!-- 💌 Messages -->
<div id="messages"></div>

<audio id="bgmusic" loop>
<source src="music2.mp3" type="audio/mpeg">
</audio>

<script>

const gift = document.getElementById("gift");
const box = document.getElementById("password-box");
const messagesDiv = document.getElementById("messages");
const music = document.getElementById("bgmusic");

/* 🎁 Click Gift */
gift.onclick = ()=>{
    box.style.display="flex";
};

/* 🔐 Password Check */
function checkPass(){
    let p = document.getElementById("pass").value;

    if(p === "1234"){   // 👉 change password here
        box.style.display="none";
        gift.style.display="none";

        music.play();
        startMessages();
    }else{
        alert("Wrong Password 😢");
    }
}

/* 💌 Messages Flow */
let msgs = [
"From the moment you came into my life, everything became more beautiful 💖",
"You are not just special… you are my happiness, my peace, my everything 🌸",
"No matter what happens, I will always be there for you ❤️",
"Every memory with you is my favorite story 📖",
"And today… I just want to say something special..."
];

let i = 0;

function startMessages(){
    showNext();
}

function showNext(){
    if(i < msgs.length){
        messagesDiv.style.display="block";
        messagesDiv.innerHTML = msgs[i];
        i++;
        setTimeout(showNext, 3500);
    }else{
        messagesDiv.innerHTML = "🎂 Happy Birthday My Love 💖✨";
        
        setTimeout(()=>{
            window.close();
        },4000);
    }
}

</script>

</body>
</html>
