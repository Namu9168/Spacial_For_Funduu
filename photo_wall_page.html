<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borahae Memories 💜</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --army-purple: #7D52AB;
            --light-purple: #BB86FC;
            --dark-bg: #0f0514;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0a2e, #0f0514, #000000);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            color: white;
            touch-action: manipulation;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }

        #start {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            text-align: center;
            padding: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            transition: opacity 0.8s ease;
        }

        #title {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            color: var(--light-purple);
            text-shadow: 0 0 20px var(--army-purple);
            z-index: 50;
        }

        .rope-line {
            position: absolute;
            width: 90%;
            height: 10vh;
            left: 5%;
            top: 15vh;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 0 0 50% 50%;
            z-index: 10;
        }

        .bulb {
            position: absolute;
            width: 8px;
            height: 12px;
            background: #fff;
            border-radius: 50% 50% 40% 40%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--light-purple);
            animation: glow 1.5s infinite alternate ease-in-out;
            z-index: 11;
            transform-origin: top center;
        }

        @keyframes glow {
            from { opacity: 0.5; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .photo-frame {
            position: absolute;
            transform-origin: top center;
            animation: hangSwing 5s infinite ease-in-out;
            cursor: pointer;
            z-index: 15;
        }

        .photo-string { width: 1px; height: 30px; background: rgba(255, 255, 255, 0.3); margin: 0 auto; }
        .clip { width: 12px; height: 16px; background: #222; margin: -2px auto 0; position: relative; z-index: 16; }
        
        .photo-content {
            background: white;
            padding: 5px 5px 15px 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: clamp(70px, 18vw, 120px);
            border-radius: 2px;
        }

        .photo-content img { width: 100%; display: block; }

        @keyframes hangSwing {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        #gift-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, var(--army-purple), #4a1e75);
            border: 1px solid var(--light-purple);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
        }

        #viewer {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        #viewer img { max-width: 90%; max-height: 80vh; border: 5px solid white; }
    </style>
</head>
<body>

<div id="start">TAP TO ENTER THE MAGIC SHOP 💜</div>
<div id="title">Poohhhhhooooo.exe Running 💜</div>

<audio id="music" loop>
    <source src="musci2.mpeg" type="audio/mpeg">
</audio>

<div id="canvas-container">
    <div class="rope-line" id="rope"></div>
</div>

<div id="viewer" onclick="this.style.display='none'">
    <img id="vimg" src="">
</div>

<button id="gift-btn">CELEBRATE OUR MAGIC ✨</button>

<script>
    const music = document.getElementById("music");
    const start = document.getElementById("start");
    const container = document.getElementById("canvas-container");
    const giftBtn = document.getElementById("gift-btn");

    start.onclick = () => {
        music.currentTime = 7; // Starts at 7 seconds
        music.play().catch(() => console.log("Play blocked"));
        
        start.style.opacity = "0";
        setTimeout(() => start.remove(), 800);
    };

    function getRopeY(xPercent) {
        const rope = document.getElementById('rope');
        const rect = rope.getBoundingClientRect();
        const height = rect.height;
        const top = rect.top;
        const normalizedX = (xPercent - 50);
        const sag = (normalizedX * normalizedX) * (height / 2500);
        return top + height + sag;
    }

    function initScene() {
        container.querySelectorAll('.bulb, .photo-frame').forEach(el => el.remove());

        const bulbCount = window.innerWidth < 600 ? 12 : 25;
        for(let i=0; i<=bulbCount; i++) {
            let x = 5 + (i * (90/bulbCount));
            let bulb = document.createElement("div");
            bulb.className = "bulb";
            bulb.style.left = x + "%";
            bulb.style.top = (getRopeY(x) - 6) + "px";
            container.appendChild(bulb);
        }

        const photos = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg"];
        const xPositions = [15, 32, 50, 68, 85];

        photos.forEach((src, i) => {
            const x = xPositions[i];
            const frame = document.createElement("div");
            frame.className = "photo-frame";
            const frameWidth = window.innerWidth < 600 ? 35 : 60; 
            frame.style.left = `calc(${x}% - ${frameWidth}px)`;
            frame.style.top = (getRopeY(x) - 5) + "px";
            frame.style.animationDelay = (i * 0.3) + "s";
            frame.innerHTML = `
                <div class="photo-string"></div>
                <div class="clip"></div>
                <div class="photo-content"><img src="${src}" onerror="this.src='https://via.placeholder.com/150?text=Memory'"></div>
            `;
            frame.onclick = (e) => {
                e.stopPropagation();
                document.getElementById("vimg").src = src;
                document.getElementById("viewer").style.display = "flex";
            };
            container.appendChild(frame);
        });
    }

    window.addEventListener('load', initScene);
    window.addEventListener('resize', initScene);

    giftBtn.onclick = () => {
        window.location.href = "gift.html";
    };
</script>

</body>
</html>
