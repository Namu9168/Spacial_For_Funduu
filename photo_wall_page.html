<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever Moments 💖✨</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #ffb6d5, #c36bb8, #4a1f47);
    font-family:'Poppins', sans-serif;
}

/* START SCREEN */
#start{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    text-align:center;
    cursor:pointer;
    z-index:9999;
    padding:20px;
}

/* TITLE */
#title{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    font-size:26px;
    color:#fff;
    text-shadow:0 0 20px #ff80df, 0 0 40px #ff3ecf;
    animation:glowTitle 2s infinite alternate;
    z-index:50;
}
@keyframes glowTitle{
    from{opacity:0.8;}
    to{opacity:1;}
}

/* SCENE */
#scene{
    position:relative;
    width:100%;
    height:100vh;
}

/* ROPE */
.string{
    position:absolute;
    width:90%;
    height:80px;
    left:5%;
    top:20%;
    border-bottom:4px solid #ffd4ff;
    border-radius:0 0 70% 70%;
    box-shadow:0 0 20px #ffb2f9;
}

/* LIGHTS */
.bulb{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 15px pink;
    animation:blink 1.5s infinite alternate;
}
@keyframes blink{
    0%{opacity:0.5;}
    100%{opacity:1;}
}

/* PHOTOS */
.photo{
    width:min(120px, 28vw);
    background:white;
    padding:8px 8px 16px;
    border-radius:10px;
    position:absolute;
    box-shadow:0 10px 25px rgba(255,140,200,0.6);
    animation:swing 4s infinite ease-in-out;
    transform-origin:top center;
    cursor:pointer;
}
.photo:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px hotpink;
}

.photo img{
    width:100%;
    border-radius:6px;
}

@keyframes swing{
    0%{transform:rotate(-4deg);}
    50%{transform:rotate(4deg);}
    100%{transform:rotate(-4deg);}
}

/* CLIP */
.clip{
    height:10px;
    width:20px;
    background:#d3a06f;
    border-radius:4px;
    margin:auto;
    margin-top:-10px;
}

/* VIEWER */
#viewer{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
    z-index:1000;
}
#viewer img{
    width:min(90%,400px);
    border-radius:12px;
    box-shadow:0 0 40px pink;
}

/* FLOWERS */
@keyframes fall{
    0%{transform:translateY(-10px);}
    100%{transform:translateY(110vh); opacity:0;}
}

/* SPARKLES */
.random-sparkle{
    width:6px;
    height:6px;
    position:fixed;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px pink;
    animation:spark 3s linear forwards;
}
@keyframes spark{
    from{opacity:1;}
    to{transform:translateY(-120vh); opacity:0;}
}

/* CARTOONS */
#cartoon-dancers{
    position:fixed;
    bottom:5px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:15px;
    font-size:30px;
}

/* BUTTON */
#gift-btn{
    position:fixed;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    background:#ff2fb2;
    color:white;
    padding:12px 30px;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
    box-shadow:0 0 20px #ff4dcc;
    transition:0.3s;
}
#gift-btn:hover{
    transform:translateX(-50%) scale(1.1);
}

/* POPUP */
#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:2000;
}
#popup-box{
    background:white;
    width:85%;
    max-width:320px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:#ff2fc4;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff2fc4;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="start">Tap to Enter Your Surprise ✨💖</div>

<div id="title">💖 Our Forever Moments 💖</div>

<audio id="music" loop>
<source src="music1.mpeg">
</audio>

<div id="scene"></div>

<div id="viewer"><img id="vimg"></div>

<div id="cartoon-dancers">
🐼 🐰 🐸 🐻
</div>

<div id="gift-btn">🎁 Next Surprise</div>

<div id="popup">
<div id="popup-box">
<h3>Ready for next surprise? 💖</h3>
<p>Something more special is waiting 🎁</p>
<button id="openBtn">Open</button>
</div>
</div>

<script>

/* ELEMENTS */
const start = document.getElementById("start");
const music = document.getElementById("music");
const scene = document.getElementById("scene");
const viewer = document.getElementById("viewer");
const vimg = document.getElementById("vimg");
const popup = document.getElementById("popup");
const giftBtn = document.getElementById("gift-btn");
const openBtn = document.getElementById("openBtn");

/* START */
start.onclick = ()=>{
    music.play();
    start.style.display="none";
};

/* ROPE */
let rope=document.createElement("div");
rope.className="string";
scene.appendChild(rope);

/* LIGHTS */
for(let i=0;i<25;i++){
let b=document.createElement("div");
b.className="bulb";
b.style.left=(5+i*3.5)+"%";
b.style.top="calc(20% + 15px)";
scene.appendChild(b);
}

/* RANDOM POSITIONS */
let positions=[
{left:"8%",top:"32%"},
{left:"25%",top:"40%"},
{left:"45%",top:"30%"},
{left:"65%",top:"38%"},
{left:"80%",top:"32%"}
];

/* PHOTOS */
for(let i=0;i<5;i++){
let p=document.createElement("div");
p.className="photo";

let pos=positions[i];
p.style.left=pos.left;
p.style.top=pos.top;

p.innerHTML=`
<div class="clip"></div>
<img src="photo${i+1}.jpg">
`;

scene.appendChild(p);

p.onclick=()=>{
vimg.src=p.querySelector("img").src;
viewer.style.opacity=1;
viewer.style.pointerEvents="auto";
};
}

/* CLOSE VIEWER */
viewer.onclick=()=>{
viewer.style.opacity=0;
viewer.style.pointerEvents="none";
};

/* FLOWERS */
setInterval(()=>{
let f=document.createElement("div");
f.innerHTML=["🌸","🌼","🌺","💮"][Math.floor(Math.random()*4)];
f.style.position="fixed";
f.style.left=Math.random()*100+"%";
f.style.top="-10px";
f.style.fontSize=(20+Math.random()*20)+"px";
f.style.animation="fall 6s linear forwards";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},400);

/* SPARKLES */
setInterval(()=>{
let s=document.createElement("div");
s.className="random-sparkle";
s.style.left=Math.random()*100+"%";
s.style.bottom="0";
document.body.appendChild(s);
setTimeout(()=>s.remove(),3000);
},150);

/* BUTTON FIX */
giftBtn.addEventListener("click", ()=>{
    popup.style.display="flex";
});

/* FINAL NAVIGATION FIX */
openBtn.addEventListener("click", ()=>{
    window.location.href = "gift.html"; // FILE SAME AS YOUR PROJECT
});

</script>

</body>
</html>
