<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Romantic Memory Wall</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle at center, #ffb6d5, #c36bb8, #4a1f47);
    font-family:'Poppins', sans-serif;
}

/* Start Screen */
#start{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    cursor:pointer;
    z-index:9999;
}

/* Scene */
#scene{
    position:relative;
    width:100%;
    height:100vh;
}

/* Rope */
.string{
    position:absolute;
    width:90%;
    height:80px;
    left:5%;
    top:20%;
    border-bottom:4px solid #ffd4ff;
    border-radius:0 0 70% 70%;
    box-shadow:0 0 20px #ffb2f9, 0 0 40px #ff7be2;
}

/* Lights */
.bulb{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle,#fff,#ffc6ff);
    box-shadow:0 0 18px #ff8ae6;
    animation: blink 1.5s infinite alternate;
}
@keyframes blink{
    0%{opacity:0.5; transform:scale(0.8);}
    100%{opacity:1; transform:scale(1.2);}
}

/* Photos */
.photo{
    width:150px;
    background:white;
    padding:10px 10px 20px;
    border-radius:10px;
    position:absolute;
    box-shadow:0 10px 35px rgba(255,140,200,0.7);
    animation:swing 4s infinite ease-in-out;
    transform-origin:top center;
    cursor:pointer;
    transition:0.3s;
}
.photo:hover{
    transform: scale(1.15);
    box-shadow: 0 0 50px hotpink;
}
.photo img{
    width:100%;
    border-radius:6px;
}
@keyframes swing{
    0%{transform:rotate(-4deg);}
    50%{transform:rotate(4deg);}
    100%{transform:rotate(-4deg);}
}

.clip{
    height:12px;
    width:22px;
    background:#d3a06f;
    border-radius:4px;
    margin:auto;
    margin-top:-12px;
}

/* Viewer */
#viewer{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
}
#viewer img{
    width:350px;
    border-radius:12px;
    box-shadow:0 0 40px pink;
}

/* Hearts */
@keyframes fall{
    0%{transform:translateY(-10px);}
    100%{transform:translateY(110vh); opacity:0;}
}

/* Sparkles */
.random-sparkle{
    width:6px;
    height:6px;
    position:fixed;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px pink;
    animation:spark 3s linear forwards;
}
@keyframes spark{
    from{opacity:1;}
    to{transform:translateY(-120vh); opacity:0;}
}

/* Cartoon dancers */
#cartoon-dancers{
    position:fixed;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:25px;
    font-size:40px;
}
.cartoon{
    animation:dance 1s infinite alternate;
}
@keyframes dance{
    0%{transform:translateY(0px);}
    100%{transform:translateY(-10px);}
}

/* Gift Button */
#gift-btn{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    background:#ff45c9;
    color:white;
    padding:12px 30px;
    border-radius:30px;
    cursor:pointer;
    font-size:20px;
    box-shadow:0 0 20px #ff4dcc;
    animation:bounceGift 1.5s infinite;
}
@keyframes bounceGift{
    0%{transform:translateX(-50%) translateY(0);}
    50%{transform:translateX(-50%) translateY(-7px);}
    100%{transform:translateX(-50%) translateY(0);}
}

/* Popup */
#popup{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}
#popup-box{
    background:white;
    width:300px;
    padding:25px;
    border-radius:20px;
    text-align:center;
    color:#ff2fc4;
    box-shadow:0 0 30px pink;
}
</style>
</head>

<body>

<div id="start">Tap to begin magic ✨</div>

<audio id="music" loop>
    <source src="music1.mpeg" type="audio/mpeg">
</audio>

<div id="scene"></div>

<div id="viewer"><img id="vimg"></div>

<div id="cartoon-dancers">
    <div class="cartoon">🐻‍❄️</div>
    <div class="cartoon">🐼</div>
    <div class="cartoon">🐰</div>
    <div class="cartoon">🐥</div>
    <div class="cartoon">🐸</div>
</div>

<div id="gift-btn">🎁 Next Surprise</div>

<div id="popup">
    <div id="popup-box">
        <h2>Ready for the next gift? 🎁</h2>
        <p>A small surprise is waiting for you!</p>
        <button id="go-next">Open Gift</button>
    </div>
</div>

<script>

/* Elements */
const start = document.getElementById("start");
const music = document.getElementById("music");
const scene = document.getElementById("scene");
const viewer = document.getElementById("viewer");
const vimg = document.getElementById("vimg");
const popup = document.getElementById("popup");
const giftBtn = document.getElementById("gift-btn");
const goNext = document.getElementById("go-next");

/* Start */
start.onclick = () => {
    music.play();
    start.style.display = "none";
};

/* Rope */
let rope = document.createElement("div");
rope.className = "string";
scene.appendChild(rope);

/* Lights */
for(let i=0;i<25;i++){
    let b = document.createElement("div");
    b.className="bulb";
    b.style.left = (5 + i*3.5) + "%";
    b.style.top = "calc(20% + 20px)";
    scene.appendChild(b);
}

/* Photos */
for(let i=0;i<5;i++){
    let p = document.createElement("div");
    p.className="photo";
    p.style.left = (10 + i*18) + "%";
    p.style.top = "30%";

    p.innerHTML = `
        <div class="clip"></div>
        <img src="photo${i+1}.jpg">
    `;

    scene.appendChild(p);

    p.onclick = () => {
        vimg.src = p.querySelector("img").src;
        viewer.style.opacity = 1;
        viewer.style.pointerEvents = "auto";
    };
}

/* Close viewer */
viewer.onclick = () => {
    viewer.style.opacity = 0;
    viewer.style.pointerEvents = "none";
};

/* Hearts */
setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = ["🌸","🌻","🌼","🌷"][Math.floor(Math.random()*4)];
    h.style.position="fixed";
    h.style.left=Math.random()*100+"%";
    h.style.top="-10px";
    h.style.fontSize=(20+Math.random()*25)+"px";
    h.style.animation="fall 6s linear forwards";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

/* Sparkles */
setInterval(() => {
    let sp = document.createElement("div");
    sp.className = "random-sparkle";
    sp.style.left = Math.random()*100 + "%";
    sp.style.bottom = "0";
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 3000);
},150);

/* Popup */
giftBtn.onclick = () => popup.style.display="flex";
goNext.onclick = () => window.location.href="gift.html";

</script>

</body>
</html>
