<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borahae Memories 💜</title>

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
    --army-purple: #7D52AB;
    --light-purple: #BB86FC;
    --gold: #FFD700;
}

body {
    margin: 0;
    overflow: hidden;
    height: 100vh;
    background: radial-gradient(circle at center, #1a0a2e, #0f0514, #000);
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* START OVERLAY */
#start {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Dancing Script', cursive;
    font-size: 2.5rem;
    cursor: pointer;
    z-index: 10000;
    transition: 0.8s ease;
}

#start span {
    font-size: 1rem;
    font-family: 'Poppins';
    letter-spacing: 4px;
    margin-top: 10px;
    opacity: 0.6;
}

/* SHIMMER TITLE */
#title {
    position: fixed;
    top: 20px;
    width: 100%;
    text-align: center;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    background: linear-gradient(90deg, var(--army-purple), var(--light-purple), #fff, var(--light-purple), var(--army-purple));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
    z-index: 50;
}

@keyframes shimmer {
    to { background-position: 200% center; }
}

/* FILM ROLL SLIDESHOW */
.film-outer {
    position: absolute;
    top: 42%;
    transform: translateY(-50%);
    width: 100%;
    overflow: hidden;
    padding: 60px 0;
    background: rgba(255, 255, 255, 0.02);
    border-top: 1px solid rgba(187, 134, 252, 0.1);
    border-bottom: 1px solid rgba(187, 134, 252, 0.1);
}

.film-track {
    display: flex;
    animation: scroll 35s linear infinite;
}

.film-track:hover { animation-play-state: paused; }

@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

.photo {
    flex-shrink: 0;
    width: 280px;
    height: 360px;
    margin: 0 25px;
    background: white;
    padding: 12px;
    border-radius: 6px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.8);
    transform: rotate(var(--r));
    transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.photo:hover {
    transform: rotate(0deg) scale(1.1) translateY(-20px) !important;
    box-shadow: 0 20px 60px var(--army-purple);
    z-index: 100;
}

/* FALLING STARS */
.star {
    position: fixed;
    top: -10px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(105vh); opacity: 0; }
}

/* GLASSMORPHISM BOTTOM LANE */
.bottom-lane {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(15, 5, 20, 0.7);
    backdrop-filter: blur(15px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 25px 0;
    z-index: 500;
}

#gift-btn {
    padding: 15px 50px;
    margin-bottom: 25px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
    background: linear-gradient(45deg, var(--army-purple), #5e338c);
    color: white;
    font-weight: 600;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: 0.4s;
}

/* ANIMATED STICKER ROW */
.sticker-row {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 35px;
    width: 95%;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 10px 20px;
}

.sticker-row::-webkit-scrollbar { display: none; }

.sticker-row img {
    height: 90px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 8px var(--army-purple));
    transition: 0.5s;
    animation: float 4s ease-in-out infinite;
    animation-delay: var(--d);
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}

.sticker-row img:hover {
    transform: scale(1.4) rotate(10deg) !important;
    filter: drop-shadow(0 0 15px var(--light-purple)) brightness(1.2);
}

/* PREMIUM POPUP MODAL */
#popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20000;
    backdrop-filter: blur(20px);
}

.magic-card {
    background: linear-gradient(135deg, #1a0a2e 0%, #0f0514 100%);
    border: 1px solid rgba(187, 134, 252, 0.3);
    padding: 50px;
    border-radius: 30px;
    text-align: center;
    max-width: 450px;
    width: 85%;
    box-shadow: 0 0 100px rgba(125, 82, 171, 0.4);
    transform: translateY(50px);
    opacity: 0;
    transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

#popup-overlay.active .magic-card {
    transform: translateY(0);
    opacity: 1;
}

.magic-card h2 {
    font-family: 'Dancing Script', cursive;
    font-size: 3rem;
    margin-bottom: 20px;
    color: var(--gold);
}

.next-page-btn {
    padding: 15px 45px;
    background: var(--light-purple);
    color: #1a0a2e;
    border: none;
    border-radius: 50px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}
</style>
</head>

<body>

    </div>
</div>

<div id="popup-overlay">
    <div class="magic-card">
        <h2>Borahae! 💜</h2>
        <p>A new chapter of magic is waiting for you. Are you ready for the next surprise?</p>
        <button class="next-page-btn" onclick="goToNextPage()">OPEN SURPRISE ✨</button>
    </div>
</div>

<script>
const start = document.getElementById("start");
const music = document.getElementById("music");
const track = document.getElementById("track");
const popup = document.getElementById("popup-overlay");

// 1. Setup Film Roll
const images = ["photo1.jpg", "photo2.jpg", "photo3.jpg", "photo4.jpg", "photo5.jpg"];
function populateTrack() {
    const combined = [...images, ...images, ...images, ...images]; 
    combined.forEach(src => {
        const div = document.createElement('div');
        div.className = 'photo';
        div.style.setProperty('--r', (Math.random() * 10 - 5) + 'deg');
        div.innerHTML = `<img src="${src}">`;
        track.appendChild(div);
    });
}
populateTrack();

// 2. Start Logic
start.onclick = () => {
    start.style.opacity = "0";
    setTimeout(() => start.style.display = "none", 800);
    music.play().catch(()=>{});
    setInterval(createStar, 120);
};

// 3. Falling Stars
function createStar() {
    const star = document.createElement("div");
    const size = Math.random() * 4 + 2 + "px";
    star.className = "star";
    star.style.width = size;
    star.style.height = size;
    star.style.left = Math.random() * 100 + "vw";
    const colors = ["#fff", "#BB86FC", "#FFD700", "#7D52AB"];
    const color = colors[Math.floor(Math.random() * colors.length)];
    star.style.background = color;
    star.style.boxShadow = `0 0 10px ${color}`;
    star.style.animationDuration = (Math.random() * 3 + 4) + "s";
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 6000);
}

// 4. Celebration Logic
document.getElementById('gift-btn').onclick = () => {
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#7D52AB', '#BB86FC', '#FFD700', '#ffffff']
    });

    popup.style.display = "flex";
    setTimeout(() => popup.classList.add("active"), 10);
};

function goToNextPage() {
    window.location.href = 'gift.html';
}
</script>
